    <!-- ======= Contact ======= -->
    <section id="contact" class="section section-contact">
      <h2 class="section-heading fade-up"><span class="section-number"></span> What's Next?</h2>
      <h3 class="contact-title fade-up">Get In Touch</h3>
      <p class="contact-desc fade-up">I'm currently looking for new opportunities and my inbox is always open. Whether you have a question, a project idea, or just want to say hi, I'll try my best to get back to you!</p>
      <form
        class="contact-form fade-up"
        id="contactForm"
        action="https://formspree.io/f/xlgwzjpb"
        method="POST"
      >
        <div class="form-row">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" required />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="your.email@example.com" required />
          </div>
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" placeholder="Your message..." required></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-submit" id="contactSubmitBtn">
          <span class="btn-text">Send Message</span>
          <span class="btn-loader" style="display:none;">
            <i class="fa-solid fa-circle-notch fa-spin"></i> Sending...
          </span>
        </button>
      </form>
      <div class="contact-status fade-up" id="contactStatus" style="display:none;"></div>
    </section>
